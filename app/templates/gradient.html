<!-- 渐变之境 — Stripe 风格渐变 mesh -->
<div style="max-width:375px;margin:0 auto;background:#0a0a0a;border-radius:16px;overflow:hidden;font-family:'Noto Serif SC','Georgia',serif;">

  <!-- 渐变 mesh 背景 hero -->
  <div style="position:relative;padding:48px 24px 32px;background:linear-gradient(135deg,{color_primary}33 0%,{color_accent}44 30%,#1a1a2e 60%,#16213e 100%);text-align:center;">
    <p style="margin:0 0 8px;font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.5);text-transform:uppercase;">{direction_label}</p>
    <h1 style="margin:0 0 4px;font-size:42px;font-weight:300;letter-spacing:-1.4px;color:#fff;line-height:1.1;">{destination_name}</h1>
    <p style="margin:0 0 20px;font-size:14px;color:rgba(255,255,255,0.7);font-family:'Noto Sans SC',sans-serif;">{destination_subtitle}</p>
    <div style="width:40px;height:1px;background:rgba(255,255,255,0.3);margin:0 auto 16px;"></div>
    <p style="margin:0;font-size:12px;color:rgba(255,255,255,0.5);font-family:'Noto Sans SC',sans-serif;">{distance} · {duration}</p>
  </div>

  <!-- 邀请函正文 -->
  <div style="padding:24px;">
    <p style="margin:0 0 24px;font-size:15px;line-height:1.8;color:rgba(255,255,255,0.85);font-family:'Noto Sans SC',sans-serif;">{description}</p>

    <!-- 图片画廊 -->
    <div style="margin:0 0 24px;display:flex;gap:8px;overflow-x:auto;">
      {images_html}
    </div>

    <!-- 体验时刻 -->
    <div style="margin:0 0 24px;">
      <p style="margin:0 0 12px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase;">体验时刻</p>
      {moments_html}
    </div>

    <!-- 文化核心 -->
    <div style="margin:0 0 24px;padding:20px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,255,255,0.08);">
      <p style="margin:0 0 8px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);text-transform:uppercase;">在地文化</p>
      <p style="margin:0;font-size:14px;line-height:1.7;color:rgba(255,255,255,0.8);font-family:'Noto Sans SC',sans-serif;">{culture_core}</p>
    </div>

    <!-- 卦象 -->
    {hexagram_html}

    <!-- BGM -->
    <div style="margin:0 0 24px;padding:16px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(255,255,255,0.06);">
      <p style="margin:0 0 4px;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">旅程 BGM</p>
      <p style="margin:0;font-size:14px;color:rgba(255,255,255,0.8);font-family:'Noto Sans SC',sans-serif;">{bgm_title} — {bgm_artist}</p>
      <p style="margin:4px 0 0;font-size:12px;color:rgba(255,255,255,0.5);font-family:'Noto Sans SC',sans-serif;">{bgm_description}</p>
    </div>

    <!-- 来源标注 -->
    <div style="margin:0 0 16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);">
      <p style="margin:0;font-size:10px;color:rgba(255,255,255,0.3);font-family:'Noto Sans SC',sans-serif;">图片来源：{image_sources}</p>
    </div>

    <!-- CTA -->
    <div style="text-align:center;">
      <a href="#" style="display:inline-block;padding:12px 32px;background:{color_primary};color:#fff;border-radius:999px;font-size:14px;font-family:'Noto Sans SC',sans-serif;text-decoration:none;letter-spacing:0.5px;">出发，去{destination_name}</a>
    </div>
  </div>

  <!-- 底部 -->
  <div style="padding:16px 24px;text-align:center;border-top:1px solid rgba(255,255,255,0.06);">
    <p style="margin:0;font-size:10px;color:rgba(255,255,255,0.25);">浙里Trip · 去一个你没想过的地方</p>
  </div>
</div>
